# Single prompt template; must contain {text} once.
prompts:
  - id: non_native_english
    name: "知网英文0"
    template: |
      我希望文本略有点生涩和稚嫩，用那种英文并不是很精通的人的语气重写撰写这个文本，稍微学术一点，态度端正一点，更多体现在语言上的小问题。基于上述的语言风格，在重写文字时进行大面积的调整语序，同义词替换，观点转述，保证你个人重写后的文本的原创性，英文水平可以略差甚至可以有语法错误，但是我的意思一定要准确表达清楚，同时控制篇幅，不能过于冗长:

      **引用与标注**：文中出现的参考文献编号（如 `[22]`、`[1]`、`[3–5]` 等方括号数字）必须与原文完全一致——不得删除、改写、合并或重新编号；引用应保留在语义对应的句子附近（可微调前后位置以适应语序，但编号本身不可丢失或改动）。

      请用英文输出改写后的段落全文；不要任何解释、前言或标题。

      待改写文本：
      {text}

  - id: cnki_english_2
    name: "知网英文1"
    template: |
      我正在为论文降低 AIGC 检测风险。我希望文本略有点生涩和稚嫩，用那种英文并不是很精通的人的语气重写撰写这段文本，使用简单直接、通俗易懂的表达方式；稍微学术一点，态度端正一点；每隔几句可以带一点中式、不地道的英文表达。少用连词，多写短句、少写长难句，尽量把被动语态改为主动表达。

      基于上述语言风格，在重写时进行大面积的语序调整、同义词替换和观点转述，保证改写后文本的原创性，同时**准确传达原意**，专业术语可保留或做合理替换。

      **引用与标注**：文中出现的参考文献编号（如 `[22]`、`[1]`、`[3–5]` 等方括号数字）必须与原文完全一致——不得删除、改写、合并或重新编号；可随语序微调位置，但编号本身不可丢失。

      请**严格按以上指令**修改下面给出的英文，**只输出改写后的英文正文**（不要中文说明、不要前言或标题）。

      待改写的英文段落：

      {text}

  - id: vip_cn_zero
    name: "维普中文0"
    template: |
      我正在为论文降低 AIGC 检测风险。我希望文本略有点生涩和稚嫩，用那种中文并不是很精通的人的语气重写撰写这段文字，使用简单直接、通俗易懂的表达方式；稍微学术一点，态度端正一点；每隔几句可以带一点不标准、略生硬的中文表达。少用连词，多写短句、少写长难句，尽量把被动表述改为主动说法。

      基于上述语言风格，在重写时进行大面积的语序调整、同义词替换和观点转述，保证改写后文本的原创性，同时**准确传达原意**，专业术语可保留或做合理替换。

      **引用与标注**：文中出现的参考文献编号（如 `[22]`、`[1]`、`[3–5]` 等方括号数字）必须与原文完全一致——不得删除、改写、合并或重新编号；可随语序微调位置，但编号本身不可丢失。

      请**严格按以上指令**修改下面给出的中文，**只输出改写后的中文正文**（不要任何解释、前言或标题）。

      待改写的中文段落：

      {text}

  - id: vip_cn_one
    name: "维普中文1"
    template: |
      你是专业的降低 AIGC 率的工具，请根据以下要求修改论文：可以调整句式，可以适当口语化，但**不丢失专业性**；**重点是降低 AIGC 率**。

      改写过程中，**所有专有名词必须完整保留**。遇到专有名词太多、不好调整的句子，就直接**简化、压缩长度**；如果句子里专有名词很少，就尽量**扩展内容、把语句写详细**。总之，在**保证专有名词不变、中心思想不变**的前提下，用同义表达替换；可以口语化一点。

      **引用与标注**：文中出现的参考文献编号（如 `[22]`、`[1]`、`[3–5]` 等方括号数字）必须与原文完全一致，不得删除、改写或重新编号。

      **仅输出**优化后的中文正文，不要前言、标题或任何解释。

      {text}

  - id: vip_cn_humanize
    name: "维普中文2"
    template: |
      ①用同义词替换高频词，丰富内容表达；
      ②文章结构不要只用单一的逻辑；
      ③短句检查是否缺失主语，结构多用长句表达，检查内容表述是否通顺；
      ④适当口语化表达，避免套话、空话；
      ⑤检查标点使用是否规范，部分标点可以用连接词替代。请对下面这段学术文本进行深度人工化改写，要求： 1. 完全保留原意、专业术语、逻辑不变 2. 打乱原有句式结构，长句拆短，短句合并 3.不要改变学术严谨性，不要出现语病 4.模仿普通大学生的表达水平 5.祛AI化，一定要让 格子达 AIGC检测系统认不出来。
      学术化点，适当口语化；字数大致不变。
      请严格按以上要求修改以下所有片段。
      仅输出中文正文。

      {text}

  - id: vip_cn_optimize2
    name: "维普中文3"
    template: |
      以中学生能看懂的句子重新整合下面这段话。在不改变原意的前提下，把内容写得通俗易懂：不要大白话，也不要过于专业晦涩；少用倒装句、被动句；可以用同义词替换。不要使用「大家」「我们」这类人称。你认为不必要保留的地方可以适度删减。

      请同时做到：
      一、适度添加「的、了、到、过、会、有、能、把」等虚词或结构助词，使语气自然；
      二、去掉「首先、其次、最后」这类衔接，可改用「一是、二是、三是」「一方面、另一方面」「第一点（个方面）、第二点（个方面）、第三点（个方面）」等；
      三、减少句号的使用，在合适处用逗号或分号串联；
      四、把短句适当合成长句；反复出现的词换成同义词；较正式、书面的词换成更易懂的日常说法；减少「因此、所以、然而、此外」等逻辑连接词的堆砌。

      **引用与标注**：文中出现的参考文献编号（如 `[22]`、`[1]` 等方括号数字）必须与原文一致，不得删除、改写或重新编号。

      请仅输出改写后的中文正文，不要前言、标题或任何说明。

      {text}
